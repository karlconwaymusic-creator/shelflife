<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="description" content="Your personal album rotation tracker">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shelflife">
  <title>Shelflife</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>Shelflife</h1>
      <div class="header-actions">
        <button id="installBtn" class="icon-btn" hidden title="Install app" aria-label="Install app">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v13M7 11l5 5 5-5"/><line x1="5" y1="21" x2="19" y2="21"/>
          </svg>
        </button>
        <button id="addBtn" class="add-btn" title="Add album" aria-label="Add album">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div id="shelfFullMsg" class="shelf-full-msg" hidden>
      Your shelf is full so you need to remove an album before you add a new one.
    </div>
    <div id="shelf" class="shelf-grid" role="list" aria-label="Album shelf"></div>
    <div id="emptyState" class="empty-state" aria-hidden="true">
      <div class="empty-icon">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="30" stroke="currentColor" stroke-width="2"/>
          <circle cx="36" cy="36" r="22" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
          <circle cx="36" cy="36" r="14" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          <circle cx="36" cy="36" r="7"  stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
          <circle cx="36" cy="36" r="3"  fill="currentColor" opacity="0.4"/>
        </svg>
      </div>
      <p class="empty-title">Your shelf is empty</p>
      <p class="empty-sub">Tap + to add your first album</p>
    </div>
  </main>

  <!-- Overlay -->
  <div id="overlay" class="overlay" aria-hidden="true"></div>

  <!-- Confirm Remove Dialog -->
  <div id="confirmDialog" class="confirm-dialog" role="alertdialog" aria-modal="true" aria-labelledby="confirmMsg" hidden>
    <p id="confirmMsg">Are you sure you want to take this one off the shelf?</p>
    <div class="confirm-actions">
      <button id="confirmCancel" class="confirm-btn confirm-btn--cancel">Cancel</button>
      <button id="confirmOk"     class="confirm-btn confirm-btn--ok">Remove</button>
    </div>
  </div>

  <!-- Add Album Modal -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-sheet">
      <div class="modal-handle"></div>

      <div class="modal-header">
        <h2 id="modalTitle">Add Album</h2>
        <button id="closeModal" class="icon-btn" aria-label="Close modal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <form id="albumForm" novalidate>

        <div class="art-section">
          <div id="artDrop" class="art-drop" tabindex="0" role="button" aria-label="Click to upload album art, or drag and drop an image">
            <img id="artImg" class="art-preview-img" alt="Album art preview" hidden>
            <div id="artPlaceholder" class="art-placeholder">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>Upload art</span>
              <span class="art-hint">tap, drag, or paste</span>
            </div>
            <input type="file" id="artFile" accept="image/*" class="visually-hidden" tabindex="-1">
          </div>
          <input type="url" id="artUrl" class="input art-url-input" placeholder="Or paste an image URL…" autocomplete="off" inputmode="url">
        </div>

        <div class="fields">
          <div class="field-group">
            <label class="label" for="albumTitle">Album <span class="req">*</span></label>
            <input type="text" id="albumTitle" class="input" placeholder="Kind of Blue" autocomplete="off" autocorrect="off" spellcheck="false">
          </div>
          <div class="field-group">
            <label class="label" for="artistName">Artist <span class="req">*</span></label>
            <input type="text" id="artistName" class="input" placeholder="Miles Davis" autocomplete="off" autocorrect="off" spellcheck="false">
          </div>
          <div class="field-group">
            <label class="label" for="spotifyUrl">Spotify URL <span class="opt">optional</span></label>
            <input type="url" id="spotifyUrl" class="input" placeholder="https://open.spotify.com/album/…" autocomplete="off" inputmode="url">
          </div>
        </div>

        <button type="submit" class="submit-btn">Add to Shelf</button>

      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
