<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="description" content="Your personal album rotation tracker">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LPQ">
  <title>LPQ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>LPQ</h1>
      <div class="header-actions">
        <button id="addBtn" class="add-btn" title="Add album" aria-label="Add album">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>

    <!-- Shelf view -->
    <div id="viewShelf" class="view">
      <div id="shelf" class="shelf-grid" role="list" aria-label="Album shelf"></div>
      <div id="emptyState" class="empty-state" aria-hidden="true">
        <div class="empty-icon">
          <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="36" cy="36" r="30" stroke="currentColor" stroke-width="2"/>
            <circle cx="36" cy="36" r="22" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
            <circle cx="36" cy="36" r="14" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <circle cx="36" cy="36" r="7"  stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
            <circle cx="36" cy="36" r="3"  fill="currentColor" opacity="0.4"/>
          </svg>
        </div>
        <p class="empty-title">Your shelf is empty</p>
        <p class="empty-sub">Tap + to add your first album</p>
      </div>
    </div>

    <!-- Vinyl view -->
    <div id="viewVinyl" class="view view--hidden">
      <div id="vinylList" class="list-view"></div>
      <div id="vinylEmpty" class="empty-state" aria-hidden="true">
        <div class="empty-icon">
          <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="36" cy="36" r="30" stroke="currentColor" stroke-width="2"/>
            <circle cx="36" cy="36" r="18" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
            <circle cx="36" cy="36" r="7"  stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <circle cx="36" cy="36" r="3"  fill="currentColor" opacity="0.4"/>
          </svg>
        </div>
        <p class="empty-title">No vinyl wishlist yet</p>
        <p class="empty-sub">Long-press an album and choose Buy on Vinyl</p>
      </div>
    </div>

    <!-- Archive view -->
    <div id="viewArchive" class="view view--hidden">
      <div id="archiveList" class="list-view"></div>
      <div id="archiveEmpty" class="empty-state" aria-hidden="true">
        <div class="empty-icon">
          <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="24" width="56" height="40" rx="4" stroke="currentColor" stroke-width="2"/>
            <path d="M8 32h56" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
            <rect x="22" y="10" width="28" height="14" rx="2" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <path d="M28 44h16M28 52h10" stroke="currentColor" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="empty-title">Archive is empty</p>
        <p class="empty-sub">Long-press an album and choose Archive</p>
      </div>
    </div>

  </main>

  <!-- Bottom nav -->
  <nav class="tab-nav" role="navigation" aria-label="Main navigation">
    <button class="tab-btn tab-btn--active" data-view="shelf" aria-label="Shelf">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>Shelf</span>
    </button>
    <button class="tab-btn" data-view="vinyl" aria-label="Vinyl">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3.5"/>
        <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
      </svg>
      <span>Vinyl</span>
    </button>
    <button class="tab-btn" data-view="archive" aria-label="Archive">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="21 8 21 21 3 21 3 8"/>
        <rect x="1" y="3" width="22" height="5" rx="1"/>
        <line x1="10" y1="12" x2="14" y2="12"/>
      </svg>
      <span>Archive</span>
    </button>
  </nav>

  <!-- Overlay (shared) -->
  <div id="overlay" class="overlay" aria-hidden="true"></div>

  <!-- Context menu -->
  <div id="contextMenu" class="context-menu" hidden>
    <div class="context-sheet">
      <div class="context-header">
        <div class="context-art-wrap">
          <img id="contextArtImg" class="context-art" alt="" hidden>
          <div id="contextNoArt" class="context-no-art">♪</div>
        </div>
        <div class="context-meta">
          <div id="contextTitle" class="context-title"></div>
          <div id="contextArtist" class="context-artist"></div>
        </div>
      </div>
      <div class="context-actions">
        <button id="ctxVinyl" class="context-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3.5"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
          </svg>
          <span id="ctxVinylLabel">Buy on Vinyl</span>
        </button>
        <button id="ctxArchive" class="context-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5" rx="1"/><line x1="10" y1="12" x2="14" y2="12"/>
          </svg>
          <span>Archive</span>
        </button>
        <button id="ctxRemove" class="context-btn context-btn--danger">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
          <span>Remove from Shelf</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Add Album Modal -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-sheet">
      <div class="modal-handle"></div>

      <div class="modal-header">
        <h2 id="modalTitle">Add Album</h2>
        <button id="closeModal" class="icon-btn" aria-label="Close modal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <form id="albumForm" novalidate>

        <div class="field-group">
          <label class="label" for="spotifyInput">Spotify Album URL</label>
          <input type="url" id="spotifyInput" class="input" placeholder="https://open.spotify.com/album/…" autocomplete="off" inputmode="url" autocorrect="off" spellcheck="false">
        </div>

        <div id="fetchLoading" class="fetch-status" hidden>
          <svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
          Looking up album…
        </div>

        <div id="fetchError" class="fetch-error" hidden></div>

        <div id="albumPreview" class="album-preview" hidden>
          <img id="previewArt" class="preview-art" alt="">
          <div class="preview-meta">
            <div id="previewTitle" class="preview-title"></div>
            <div id="previewArtist" class="preview-artist"></div>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn" disabled>Add to Shelf</button>

      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
